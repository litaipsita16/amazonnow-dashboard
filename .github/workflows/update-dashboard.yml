name: Update Dashboard

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -r requirements_cloud.txt

      - name: Create service account file
        run: |
          echo '${{ secrets.GCP_SERVICE_ACCOUNT }}' > amazonnow-dashboard-4499c556ed67.json

      - name: Run dashboard pipeline
        run: |
          python amazonnow_pipeline_v5_final.py

      - name: Commit updated dashboard
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add amazonnow_dashboard_live.html
          git commit -m "Auto update dashboard" || echo "No changes"
          git push
